<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Journal échecs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mon journal d'entraînement</h1>

  <form>
    <label>Date</label>
    <input type="date" id="champ-date" />

    <label>Durée (min)</label>
    <input type="number" id="champ-duree" value="45" />

    <label>Ce que j'ai travaillé</label>
    <input type="text" id="champ-travail" placeholder="Ex : fourchettes..." />

    <button type="button" onclick="enregistrer()">Enregistrer</button>
  </form>

  <div id="liste"></div>

  <script src="script.js"></script>
</body>
</html>

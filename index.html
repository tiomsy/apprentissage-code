<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Journal échecs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mon journal d'entraînement</h1>
<button type="button" onclick="window.location.href='bilan.html'">Voir le bilan complet →</button>  <form>
    <label>Date</label>
    <input type="date" id="champ-date" />

    <label>Durée (min)</label>
    <input type="number" id="champ-duree" value="45" />

    <label>Catégorie</label>
    <select id="champ-categorie">
      <option value="tactique">Tactique</option>
      <option value="strategie">Stratégie</option>
      <option value="finale">Finale</option>
      <option value="ouverture">Ouverture</option>
      <option value="online">Jeu online</option>
    </select>

    <label>Détails</label>
    <input type="text" id="champ-travail" placeholder="Ex : fourchettes, finales de tours..." />

    <button type="button" onclick="enregistrer()">Enregistrer</button>
  </form>

  <div id="derniere-seance"></div>
  <div id="bilan-semaine"></div>

  <script src="script.js"></script>
</body>
</html>
